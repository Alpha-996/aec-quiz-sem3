<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — AEC Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #F5F1EB;
      --surface:      #FEFCF9;
      --text:         #1C1914;
      --muted:        #7A6E64;
      --accent:       #1B4F8A;
      --accent-lt:    #E8F0FA;
      --accent-dark:  #163F6E;
      --border:       #DDD6CC;
      --gold:         #B45309;
      --correct:      #166534;
      --correct-bg:   #DCFCE7;
      --correct-bd:   #86EFAC;
      --wrong:        #991B1B;
      --wrong-bg:     #FEE2E2;
      --wrong-bd:     #FCA5A5;
      --radius:       12px;
    }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; z-index: 100;
      transition: opacity 0.3s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p { font-size: 0.9rem; color: var(--muted); }

    /* ── HEADER ── */
    #quiz-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      position: sticky; top: 0; z-index: 10;
    }
    .header-inner {
      max-width: 720px; margin: 0 auto;
      display: flex; align-items: center;
      gap: 1rem; padding: 0.85rem 0;
    }
    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: none; cursor: pointer;
      color: var(--text); text-decoration: none;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .back-btn:hover { background: var(--bg); border-color: #C9BFB0; }
    .back-btn svg { width: 16px; height: 16px; }
    .header-info { flex: 1; min-width: 0; }
    .header-chapter {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .q-counter {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
    }
    .q-counter span { color: var(--text); }

    /* ── PROGRESS BAR ── */
    .progress-track {
      height: 3px;
      background: var(--border);
      position: sticky; top: 57px; z-index: 9;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── MAIN ── */
    #quiz-section { flex: 1; }
    .quiz-wrap {
      max-width: 720px; margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ── QUESTION CARD ── */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .q-number {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }
    .q-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      line-height: 1.6;
      color: var(--text);
    }

    /* ── OPTIONS ── */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.35s 0.05s ease both;
    }
    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
      padding: 1rem 1.1rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.5;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      width: 100%;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--accent-lt);
      transform: translateX(2px);
    }
    .option-btn:disabled { cursor: default; }
    .option-key {
      display: flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; flex-shrink: 0;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--bg);
      transition: all 0.15s;
      margin-top: 1px;
    }
    .option-text { flex: 1; }

    /* STATE: correct */
    .option-btn.correct {
      border-color: var(--correct-bd);
      background: var(--correct-bg);
      color: var(--correct);
    }
    .option-btn.correct .option-key {
      background: var(--correct);
      border-color: var(--correct);
      color: white;
    }
    /* STATE: wrong */
    .option-btn.wrong {
      border-color: var(--wrong-bd);
      background: var(--wrong-bg);
      color: var(--wrong);
    }
    .option-btn.wrong .option-key {
      background: var(--wrong);
      border-color: var(--wrong);
      color: white;
    }
    /* STATE: dimmed (other options after answer) */
    .option-btn.dimmed {
      opacity: 0.42;
    }

    /* ── EXPLANATION BOX ── */
    .explanation-box {
      background: var(--accent-lt);
      border: 1px solid #B3CDE8;
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 1rem 1.1rem;
      margin-bottom: 1.25rem;
      font-size: 0.88rem;
      line-height: 1.65;
      color: #1E3A5F;
      display: none;
      animation: slideDown 0.25s ease both;
    }
    .explanation-box.visible { display: block; }
    .explanation-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NEXT BUTTON ── */
    .next-btn {
      display: none;
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      animation: fadeUp 0.25s ease both;
    }
    .next-btn.visible { display: flex; }
    .next-btn:hover { background: var(--accent-dark); }
    .next-btn:active { transform: scale(0.98); }
    .next-btn svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 2; }

    /* keyboard hint */
    .kb-hint {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.75rem;
    }
    .kb-tag {
      display: inline-block;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-family: monospace;
      font-size: 0.7rem;
    }

    /* ── RESULTS SECTION ── */
    #results-section {
      display: none;
      flex: 1;
      animation: fadeUp 0.4s ease both;
    }
    #results-section.visible { display: flex; flex-direction: column; }

    .results-wrap {
      max-width: 720px; margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
      width: 100%;
    }

    .results-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .results-kicker {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .results-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .results-sub {
      font-size: 0.88rem;
      color: var(--muted);
    }

    /* Score circle */
    .score-circle-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 2rem 0;
    }
    .score-circle {
      position: relative;
      width: 150px; height: 150px;
      margin-bottom: 1.25rem;
    }
    .score-circle svg { width: 150px; height: 150px; transform: rotate(-90deg); }
    .score-circle .track { fill: none; stroke: var(--border); stroke-width: 10; }
    .score-circle .fill  {
      fill: none; stroke: var(--accent); stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 408;
      stroke-dashoffset: 408;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .score-circle .fill.green  { stroke: var(--correct); }
    .score-circle .fill.orange { stroke: #D97706; }
    .score-circle .fill.red    { stroke: var(--wrong); }
    .score-num {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .score-pct {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .score-lbl {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .grade-badge {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      border-radius: 20px;
    }
    .grade-A { background: var(--correct-bg); color: var(--correct); }
    .grade-B { background: #DCFCE7;           color: #166534; }
    .grade-C { background: #FEF3C7;           color: #92400E; }
    .grade-D { background: #FFEDD5;           color: #9A3412; }
    .grade-F { background: var(--wrong-bg);   color: var(--wrong); }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin: 1.5rem 0;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }
    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .stat-value.green  { color: var(--correct); }
    .stat-value.red    { color: var(--wrong); }
    .stat-value.accent { color: var(--accent); }
    .stat-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Action buttons */
    .action-row {
      display: flex;
      gap: 0.75rem;
      margin: 1.75rem 0;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1;
      min-width: 140px;
      padding: 0.85rem 1.25rem;
      border-radius: 10px;
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: var(--bg); }
    .btn-outline   { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
    .btn-outline:hover { background: var(--accent-lt); }
    .btn:disabled  { opacity: 0.45; cursor: default; }

    /* Review section */
    .review-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .review-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
    }
    .review-count {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--wrong);
      background: var(--wrong-bg);
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
    }

    .review-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .review-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .review-q {
      padding: 1rem 1.1rem 0.6rem;
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
    }
    .review-q-num {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }
    .review-answers {
      padding: 0.6rem 1.1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .review-answer {
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      border-radius: 7px;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      line-height: 1.5;
    }
    .review-answer.your-wrong {
      background: var(--wrong-bg);
      color: var(--wrong);
    }
    .review-answer.the-correct {
      background: var(--correct-bg);
      color: var(--correct);
      font-weight: 700;
    }
    .review-icon { flex-shrink: 0; margin-top: 1px; font-size: 0.9rem; }

    .perfect-banner {
      background: var(--correct-bg);
      border: 1px solid var(--correct-bd);
      border-radius: 10px;
      padding: 1.5rem;
      text-align: center;
      color: var(--correct);
    }
    .perfect-banner .big-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .perfect-banner h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .perfect-banner p { font-size: 0.85rem; opacity: 0.85; }

    /* Responsive */
    @media (max-width: 480px) {
      .quiz-wrap, .results-wrap { padding: 1.5rem 1rem 4rem; }
      .question-card { padding: 1.5rem; }
      .q-text { font-size: 1.05rem; }
      .stats-row { grid-template-columns: repeat(3,1fr); gap: 0.5rem; }
      .stat-value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-spinner"></div>
    <p>Loading questions…</p>
  </div>

  <!-- HEADER (sticky) -->
  <header id="quiz-header" style="display:none">
    <div class="header-inner">
      <a href="index.html" class="back-btn" title="Back to home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </a>
      <div class="header-info">
        <div class="header-chapter" id="hdr-chapter">Chapter 1</div>
        <div class="header-title" id="hdr-title">Loading…</div>
      </div>
      <div class="q-counter"><span id="q-current">1</span> / <span id="q-total">—</span></div>
    </div>
  </header>
  <div class="progress-track" id="progress-track" style="display:none">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <!-- QUIZ SECTION -->
  <section id="quiz-section" style="display:none">
    <div class="quiz-wrap">

      <div class="question-card" id="q-card">
        <div class="q-number" id="q-num-label">Question 1</div>
        <div class="q-text" id="q-text">Loading…</div>
      </div>

      <div class="options-list" id="options-list"></div>

      <div class="explanation-box" id="explanation-box">
        <div class="explanation-label">Explanation</div>
        <div id="explanation-text"></div>
      </div>

      <button class="next-btn" id="next-btn" onclick="nextQuestion()">
        <span id="next-label">Next Question</span>
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <div class="kb-hint" id="kb-hint">
        Press <span class="kb-tag">1</span><span class="kb-tag">2</span><span class="kb-tag">3</span><span class="kb-tag">4</span> to select &nbsp;·&nbsp;
        <span class="kb-tag">Enter</span> for next
      </div>

    </div>
  </section>

  <!-- RESULTS SECTION -->
  <section id="results-section">
    <div class="results-wrap">
      <div class="results-header">
        <div class="results-kicker">Quiz Complete</div>
        <div class="results-title">Your Results</div>
        <div class="results-sub" id="results-chapter-sub">Chapter 1 — The Boss Came to Dinner</div>
      </div>

      <!-- Score circle -->
      <div class="score-circle-wrap">
        <div class="score-circle">
          <svg viewBox="0 0 150 150">
            <circle class="track" cx="75" cy="75" r="65"/>
            <circle class="fill" id="score-arc" cx="75" cy="75" r="65"/>
          </svg>
          <div class="score-num">
            <div class="score-pct" id="score-pct">0%</div>
            <div class="score-lbl">Score</div>
          </div>
        </div>
        <div class="grade-badge" id="grade-badge">—</div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value green" id="stat-correct">0</div>
          <div class="stat-label">Correct</div>
        </div>
        <div class="stat-card">
          <div class="stat-value red" id="stat-wrong">0</div>
          <div class="stat-label">Wrong</div>
        </div>
        <div class="stat-card">
          <div class="stat-value accent" id="stat-total">0</div>
          <div class="stat-label">Total</div>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="action-row">
        <button class="btn btn-primary" id="btn-retry-wrong" onclick="retryWrong()">Retry Wrong</button>
        <button class="btn btn-secondary" onclick="retryAll()">Try Again</button>
        <a href="index.html" class="btn btn-outline" style="text-align:center;text-decoration:none">Home</a>
      </div>

      <!-- Wrong answers review -->
      <div id="review-section"></div>

    </div>
  </section>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let chapterId     = '';
let chapterData   = null;
let questions     = [];   // working set (all or retry subset)
let shuffledQs    = [];   // shuffled question order
let currentIdx    = 0;
let currentOpts   = [];   // shuffled options for current question
let answered      = false;
let userAnswers   = [];   // [{qId, qText, selected, correct, wasCorrect}]
const KEYS = ['1','2','3','4'];

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  const params   = new URLSearchParams(window.location.search);
  chapterId      = params.get('chapter') || 'chapter1';
  const isRetry  = params.get('retry') === 'true';

  try {
    const res  = await fetch(`data/${chapterId}.json`);
    if (!res.ok) throw new Error('File not found');
    chapterData = await res.json();

    document.title = `${chapterData.title} — AEC Quiz`;
    document.getElementById('hdr-chapter').textContent = chapterData.chapter;
    document.getElementById('hdr-title').textContent   = chapterData.title;
    document.getElementById('results-chapter-sub').textContent =
      `${chapterData.chapter} — ${chapterData.title}`;

    if (isRetry) {
      const stored = sessionStorage.getItem(`wrong_${chapterId}`);
      const wrongIds = stored ? JSON.parse(stored) : [];
      questions = chapterData.questions.filter(q => wrongIds.includes(q.id));
      if (!questions.length) questions = chapterData.questions;
    } else {
      questions = chapterData.questions;
    }

    startQuiz();
  } catch (e) {
    document.getElementById('loader').innerHTML =
      `<p style="color:#991B1B;font-weight:700">Failed to load questions.<br>Check that data/${chapterId}.json exists.</p>`;
  }
});

// ─────────────────────────────────────────────
// SHUFFLE
// ─────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─────────────────────────────────────────────
// START
// ─────────────────────────────────────────────
function startQuiz() {
  shuffledQs  = shuffle(questions);
  currentIdx  = 0;
  userAnswers = [];

  document.getElementById('q-total').textContent = shuffledQs.length;

  document.getElementById('loader').classList.add('hidden');
  document.getElementById('quiz-header').style.display  = 'block';
  document.getElementById('progress-track').style.display = 'block';
  document.getElementById('quiz-section').style.display = 'block';

  renderQuestion();
}

// ─────────────────────────────────────────────
// RENDER QUESTION
// ─────────────────────────────────────────────
function renderQuestion() {
  answered = false;
  const q  = shuffledQs[currentIdx];

  // Re-animate card
  const card = document.getElementById('q-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';

  document.getElementById('q-current').textContent   = currentIdx + 1;
  document.getElementById('q-num-label').textContent = `Question ${currentIdx + 1} of ${shuffledQs.length}`;
  document.getElementById('q-text').textContent      = q.question;

  // Progress bar
  const pct = ((currentIdx) / shuffledQs.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';

  // Shuffle options
  currentOpts = shuffle(q.options);

  // Build option buttons
  const list = document.getElementById('options-list');
  list.innerHTML = '';
  list.style.animation = 'none';
  void list.offsetWidth;
  list.style.animation = '';

  currentOpts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.opt = opt;
    btn.innerHTML = `
      <div class="option-key">${i + 1}</div>
      <div class="option-text">${opt}</div>
    `;
    btn.addEventListener('click', () => selectOption(btn, opt, q));
    list.appendChild(btn);
  });

  // Hide explanation & next
  document.getElementById('explanation-box').classList.remove('visible');
  document.getElementById('next-btn').classList.remove('visible');

  // Next button label
  document.getElementById('next-label').textContent =
    currentIdx < shuffledQs.length - 1 ? 'Next Question' : 'See Results';
}

// ─────────────────────────────────────────────
// SELECT OPTION
// ─────────────────────────────────────────────
function selectOption(btn, selected, q) {
  if (answered) return;
  answered = true;

  const isCorrect = selected === q.correct;
  const buttons   = document.querySelectorAll('.option-btn');

  buttons.forEach(b => {
    b.disabled = true;
    const bOpt = b.dataset.opt;
    if (bOpt === q.correct) {
      b.classList.add('correct');
    } else if (b === btn && !isCorrect) {
      b.classList.add('wrong');
    } else {
      b.classList.add('dimmed');
    }
  });

  // Log answer
  userAnswers.push({
    qId:       q.id,
    qText:     q.question,
    selected:  selected,
    correct:   q.correct,
    wasCorrect: isCorrect,
    explanation: q.explanation
  });

  // Show explanation
  if (q.explanation) {
    document.getElementById('explanation-text').textContent = q.explanation;
    document.getElementById('explanation-box').classList.add('visible');
  }

  // Show next button
  document.getElementById('next-btn').classList.add('visible');
}

// ─────────────────────────────────────────────
// NEXT QUESTION
// ─────────────────────────────────────────────
function nextQuestion() {
  if (!answered) return;
  currentIdx++;
  if (currentIdx < shuffledQs.length) {
    renderQuestion();
  } else {
    showResults();
  }
}

// ─────────────────────────────────────────────
// SHOW RESULTS
// ─────────────────────────────────────────────
function showResults() {
  // Complete progress bar
  document.getElementById('progress-fill').style.width = '100%';

  document.getElementById('quiz-section').style.display  = 'none';
  document.getElementById('results-section').classList.add('visible');

  const total   = userAnswers.length;
  const correct = userAnswers.filter(a => a.wasCorrect).length;
  const wrong   = total - correct;
  const pct     = Math.round((correct / total) * 100);

  // Grade
  let grade, gradeClass;
  if (pct >= 90)      { grade = 'Excellent · A'; gradeClass = 'grade-A'; }
  else if (pct >= 75) { grade = 'Good · B';      gradeClass = 'grade-B'; }
  else if (pct >= 60) { grade = 'Average · C';   gradeClass = 'grade-C'; }
  else if (pct >= 45) { grade = 'Pass · D';      gradeClass = 'grade-D'; }
  else                { grade = 'Needs Work · F'; gradeClass = 'grade-F'; }

  document.getElementById('score-pct').textContent  = pct + '%';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent   = wrong;
  document.getElementById('stat-total').textContent   = total;

  const badge = document.getElementById('grade-badge');
  badge.textContent  = grade;
  badge.className    = `grade-badge ${gradeClass}`;

  // Animate score arc (circumference = 2πr = 2π×65 ≈ 408.4)
  const circ = 408.4;
  const arc  = document.getElementById('score-arc');
  const offset = circ * (1 - pct / 100);
  arc.className = 'fill ' + (pct >= 75 ? 'green' : pct >= 50 ? 'orange' : 'red');
  setTimeout(() => { arc.style.strokeDashoffset = offset; }, 100);

  // Retry wrong button
  const btnRetry = document.getElementById('btn-retry-wrong');
  btnRetry.disabled = wrong === 0;

  // Save wrong IDs to sessionStorage
  const wrongAnswers = userAnswers.filter(a => !a.wasCorrect);
  sessionStorage.setItem(`wrong_${chapterId}`, JSON.stringify(wrongAnswers.map(a => a.qId)));

  // Build review section
  const rev = document.getElementById('review-section');
  if (wrong === 0) {
    rev.innerHTML = `
      <div class="perfect-banner">
        <div class="big-icon">🎉</div>
        <h3>Perfect Score!</h3>
        <p>You answered every question correctly. Excellent work!</p>
      </div>`;
  } else {
    rev.innerHTML = `
      <div class="review-header">
        <div class="review-title">Questions to Review</div>
        <div class="review-count">${wrong} incorrect</div>
      </div>
      <div class="review-list" id="review-list"></div>`;

    const list = document.getElementById('review-list');
    wrongAnswers.forEach((a, i) => {
      const item = document.createElement('div');
      item.className = 'review-item';
      item.innerHTML = `
        <div class="review-q">
          <div class="review-q-num">Question ${i + 1}</div>
          ${a.qText}
        </div>
        <div class="review-answers">
          <div class="review-answer your-wrong">
            <span class="review-icon">✗</span>
            <span>Your answer: ${a.selected}</span>
          </div>
          <div class="review-answer the-correct">
            <span class="review-icon">✓</span>
            <span>Correct: ${a.correct}</span>
          </div>
          ${a.explanation ? `
          <div style="margin-top:0.5rem;padding:0.6rem 0.75rem;background:var(--accent-lt);border-radius:7px;font-size:0.82rem;color:#1E3A5F;line-height:1.55;border-left:3px solid var(--accent)">
            <strong style="font-size:0.68rem;letter-spacing:0.08em;text-transform:uppercase;display:block;margin-bottom:0.3rem;color:var(--accent)">Explanation</strong>
            ${a.explanation}
          </div>` : ''}
        </div>`;
      list.appendChild(item);
    });
  }
}

// ─────────────────────────────────────────────
// RETRY
// ─────────────────────────────────────────────
function retryWrong() {
  window.location.href = `quiz.html?chapter=${chapterId}&retry=true`;
}
function retryAll() {
  window.location.href = `quiz.html?chapter=${chapterId}`;
}

// ─────────────────────────────────────────────
// KEYBOARD SUPPORT
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const section = document.getElementById('quiz-section');
  if (section.style.display === 'none') return;

  if (!answered && KEYS.includes(e.key)) {
    const idx  = parseInt(e.key) - 1;
    const btns = document.querySelectorAll('.option-btn');
    if (btns[idx]) btns[idx].click();
  }

  if (answered && (e.key === 'Enter' || e.key === ' ')) {
    e.preventDefault();
    nextQuestion();
  }
});
</script>
</body>
